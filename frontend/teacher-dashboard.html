<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard | Smart Attendance</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="#" class="logo">📊 Smart Attendance</a>
      <div class="nav-links">
        <span id="userName" style="font-weight: 500;">Teacher</span>
        <button id="logoutBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="#" class="active" data-tab="qr">QR Generator</a></li>
        <li><a href="#" data-tab="attendance">Attendance Viewer</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content bg-gradient">
      <div class="container">

        <!-- QR Generator Tab -->
        <div id="tab-qr" class="tab-content">
          <h2>Generate Attendance QR</h2>
          <div class="grid grid-cols-2 gap-6">

            <!-- Settings Form -->
            <div class="card">
              <form id="qrForm">
                <div class="form-group">
                  <label class="form-label">Select Subject</label>
                  <select id="qrSubject" class="form-control" required>
                    <!-- Populated via JS -->
                  </select>
                </div>

                <div class="form-group">
                  <label class="form-label">QR Time Limit</label>
                  <select id="qrDuration" class="form-control" required>
                    <option value="2">2 Minutes</option>
                    <option value="5" selected>5 Minutes</option>
                    <option value="10">10 Minutes</option>
                  </select>
                </div>



                <button type="submit" class="btn btn-primary btn-block" id="btnGenerate">Generate QR Code</button>
              </form>
            </div>

            <!-- Output Display -->
            <div class="card text-center" id="qrOutputCard" style="display: none;">
              <h3 id="qrSubjectName"></h3>
              <div style="background: #F3F4F6; padding: 1rem; border-radius: 8px; margin: 1rem 0;">
                <p class="text-muted mb-1" style="font-size: 0.9rem;">Tell students to enter this PIN</p>
                <h1 class="text-primary" style="font-size: 3rem; letter-spacing: 8px; margin: 0;" id="qrPinDisplay"></h1>
              </div>
              <p class="text-danger" id="qrTimer" style="font-weight: bold; font-size: 1.2rem;"></p>

              <div id="qrCodeContainer" style="margin: 1.5rem 0;">
                <img id="qrImage" src="" alt="QR Code"
                  style="max-width: 250px; border: 1px solid #ddd; padding: 10px; border-radius: 10px;">
                <!-- Overlay for expiry -->
                <div id="qrExpiredOverlay" class="d-none"
                  style="position: absolute; top: 0; left: 0; right: 0; bottom:0; background: rgba(255,255,255,0.8); display:flex; align-items:center; justify-content:center; color: red; font-weight: bold; font-size: 2rem;">
                  EXPIRED
                </div>
              </div>

              <div class="form-group">
                <input type="text" id="qrUrl" class="form-control" readonly value=""
                  style="font-size: 0.8rem; text-align: center;">
              </div>

              <button class="btn btn-primary btn-block mt-4" id="btnDownloadQR">⬇️ Download QR Code</button>
              <button class="btn btn-secondary btn-block mt-2" id="btnEmailQR">✉️ Email to All Enrolled Students</button>
              <button type="button" class="btn btn-danger btn-block mt-2" id="btnExpireQR">⏳ Expire QR Now</button>
              <input type="hidden" id="currentSessionToken">
            </div>

          </div>
        </div>

        <!-- Attendance Viewer Tab -->
        <div id="tab-attendance" class="tab-content d-none">
          <h2>Subject Attendance</h2>
          <div class="card" style="margin-bottom: 2rem;">
            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label">Subject</label>
                <select id="viewSubject" class="form-control">
                  <!-- Populated via JS -->
                </select>
              </div>
              <div style="display: flex; align-items: flex-end; padding-bottom: 1.5rem;">
                <button type="button" class="btn btn-primary" onclick="loadSubjectAttendance()">View Attendance</button>
              </div>
            </div>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Student Name</th>
                  <th>Roll No</th>
                  <th>Status</th>
                  <th>Method</th>
                </tr>
              </thead>
              <tbody id="teacherAttendanceTableBody">
                <!-- Data populated by JS -->
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="js/teacher.js"></script>
</body>

</html>
