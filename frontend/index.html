<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
    }
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      font-size: 3rem;
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo-icon">📊</div>
      <h1>Smart Attendance</h1>
      <p>Secure & Location-Aware</p>
    </div>

    <div class="glass-card">
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-block">
          <span>Sign In</span>
        </button>
        <p id="errorMsg" class="text-danger text-center mt-2 d-none"></p>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
