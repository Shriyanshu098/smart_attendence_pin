<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance | Smart Attendance</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
    }

    .attend-container {
      width: 100%;
      max-width: 500px;
    }
  </style>
</head>

<body>

  <div class="attend-container">

    <!-- Loading Screen -->
    <div id="loadingScreen" class="glass-card text-center">
      <div class="spinner spinner-primary mb-4"></div>
      <h3>Verifying QR Code...</h3>
      <p>Please wait while we check this session.</p>
    </div>

    <!-- Error Screen -->
    <div id="errorScreen" class="glass-card text-center d-none">
      <div style="font-size: 4rem; color: var(--danger); margin-bottom: 1rem;">❌</div>
      <h2 id="errorTitle">Invalid Session</h2>
      <p id="errorDesc" class="text-muted mb-4">This QR code is either expired or has already been used.</p>
      <button class="btn btn-secondary" onclick="window.location.href='/index.html'">Go to Home</button>
    </div>

    <!-- Success Output Screen -->
    <div id="successScreen" class="glass-card text-center d-none">
      <div style="font-size: 4rem; color: var(--success); margin-bottom: 1rem;">✅</div>
      <h2>Attendance Marked!</h2>
      <p>Your presence has been successfully registered.</p>

      <button class="btn btn-primary mt-4" onclick="window.location.href='/student-dashboard.html'">Go to
        Dashboard</button>
    </div>

    <!-- Attendance Form Screen -->
    <div id="formScreen" class="glass-card d-none">
      <div class="text-center mb-4">
        <h2>Mark Attendance</h2>
        <p class="text-primary" style="font-weight: bold;" id="subjectNameDisplay">Subject</p>
      </div>

      <form id="attendForm">
        <div class="form-group text-center" style="background: #F9FAFB; padding: 1rem; border-radius: 8px;">
          <p id="userInfo" style="font-weight: bold;"></p>
          <p class="text-muted" style="font-size: 0.85rem;" id="timeInfo"></p>
        </div>

        <div class="form-group mb-4 mt-4">
          <label class="form-label text-left" style="display: block;">Enter 4-digit PIN</label>
          <input type="text" id="pinInput" class="form-control text-center" style="font-size: 1.5rem; letter-spacing: 5px;" placeholder="----" maxlength="4" required>
        </div>

        <button type="submit" id="btnSubmit" class="btn btn-primary btn-block">Submit Attendance</button>
      </form>
    </div>

  </div>

  <div id="toast-container"></div>
  <script src="js/attend.js"></script>
</body>

</html>
